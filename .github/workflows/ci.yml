name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.6"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/pearcut
